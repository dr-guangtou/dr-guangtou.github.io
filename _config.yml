  avatar: bio-photo.jpg
  bio: "post-doc in astrophysics, massive galaxy lover"
  email: dr.guangtou@gmail.com 
  disqus-shortname: 
  twitter: dr_guangtou
  facebook: #username
  google:
    plus: songhuang.nju
    analytics: 
    verify: 
    ad-client: 
    ad-slot: 
  bing-verify: 
  github: dr-guangtou
  stackoverflow: #http://stackoverflow.com/users/123456/username
  linkedin: #username
  instagram: #username
  lastfm: #username
  tumblr: #username
  pinterest: #username
  foursquare: #username
  steam: #username
  dribbble: #username
  youtube: #username
  soundcloud: #username
  weibo: 光头怪博士
  flickr: #username

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "Gemfile", "Gemfile.lock", "LICENSE", "README.md"]
